<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tính giá taxi</title>

<style>
:root{
  --primary:#2d7df4;
  --accent:#00b14f;
  --bg:#f2f2f7;
}
body{
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg);
  margin:0;
  padding:12px;
}
.container{max-width:500px;margin:auto}
.card{
  background:#fff;border-radius:16px;padding:14px;margin-bottom:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.05)
}
.title{font-weight:700;font-size:18px;margin-bottom:10px}
label{font-weight:600;margin:6px 0;display:block}

input,select{
  width:100%;padding:14px;border-radius:12px;
  border:1px solid #ddd;font-size:16px;margin-bottom:10px;
}

input[type=checkbox]{width:auto;margin-right:8px}

button{
  width:100%;padding:14px;border:0;border-radius:12px;
  font-size:16px;font-weight:700;color:#fff;background:var(--primary)
}
.btn-green{background:var(--accent)}
.call{background:#ff3b30}
.row{display:flex;gap:10px}

.line{
  display:flex;justify-content:space-between;
  padding:8px 0;border-bottom:1px dashed #eee
}
.total{
  font-size:22px;font-weight:900;text-align:right;
  margin-top:10px;color:#e11d48
}
.note{color:#16a34a;font-weight:600;margin-top:6px}
.hidden{display:none}
</style>
</head>

<body>
<div class="container">

<div class="card">
<div class="title">🚗 TÍNH GIÁ TAXI</div>

<label>Loại xe</label>
<select id="carType">
  <option value="car">Xanh Car</option>
  <option value="premium">Xanh Premium</option>
  <option value="minio">Xanh Minio</option>
  <option value="vf3">VF3 (rẻ hơn 10%)</option>
</select>

<label>Quãng đường (km)</label>
<input id="km" type="number" inputmode="decimal" placeholder="Nhập km">

<label style="display:flex;align-items:center">
<input type="checkbox" id="returnTrip"> Có khách chiều về (giảm 60%)
</label>

<label>Thời gian chờ (phút)</label>
<input id="wait" type="number" inputmode="numeric" placeholder="Nhập phút">

<label style="display:flex;align-items:center">
<input type="checkbox" id="night"> Phụ phí ban đêm
</label>

<button onclick="calc()">TÍNH GIÁ</button>
</div>

<div class="card">
<div class="title">📊 KẾT QUẢ</div>
<div id="result" class="hidden">
<div id="detail"></div>
<div id="total" class="total"></div>
<div id="saving" class="note"></div>
</div>
<div id="empty">Nhập dữ liệu để tính...</div>
</div>

<div class="row">
<button class="call" onclick="callNow()">📞 Gọi</button>
<button class="btn-green" onclick="zaloNow()">💬 Zalo</button>
</div>

</div>

<script>
// ===== BẢNG GIÁ =====
const PRICE = {
  car:{open:30500,p1:15300,p2:14000,p3:13000},
  premium:{open:34400,p1:16800,p2:15400,p3:14300},
  minio:{open:27500,p1:13200,p2:12400,p3:10700},
  vf3:{open:24750,p1:11880,p2:11160,p3:9630}
};

// ===== CẤU HÌNH =====
const WAIT_PRICE = 1000;      // 60k/giờ
const NIGHT_EXTRA = 20000;    // phụ phí đêm (bạn sửa tùy)

// ===== TÍNH KM =====
function calcDistanceCost(km, p){
  let remain = Math.max(0, km-2);

  const km1 = Math.min(10, remain); remain -= km1;
  const km2 = Math.min(13, remain); remain -= km2;
  const km3 = remain;

  return (km>0?p.open:0) + km1*p.p1 + km2*p.p2 + km3*p.p3;
}

// ===== MAIN =====
function calc(){
  const km = parseFloat(document.getElementById('km').value)||0;
  const wait = parseFloat(document.getElementById('wait').value)||0;
  const night = document.getElementById('night').checked;
  const returnTrip = document.getElementById('returnTrip').checked;
  const type = document.getElementById('carType').value;

  if(km<=0){ alert("Nhập km"); return; }

  const p = PRICE[type];

  // chiều đi
  const go = calcDistanceCost(km, p);

  // chiều về
  let backFull=0, backDiscount=0, backFinal=0;
  if(returnTrip){
    backFull = calcDistanceCost(km, p);
    backDiscount = backFull * 0.6;
    backFinal = backFull * 0.4;
  }

  // chờ
  const waitCharge = wait>4 ? (wait-4)*WAIT_PRICE : 0;

  // phụ phí đêm
  const nightFee = night ? NIGHT_EXTRA : 0;

  // tổng
  const total = go + backFinal + waitCharge + nightFee;

  // render
  const d = document.getElementById('detail');
  d.innerHTML="";

  function line(t,v){
    d.innerHTML += `<div class="line"><span>${t}</span><span>${v.toLocaleString()} đ</span></div>`;
  }

  line("🚗 Chiều đi", go);

  if(returnTrip){
    line("🔁 Giá gốc chiều về", backFull);
    line("💸 Giảm 60%", -backDiscount);
    line("👉 Trả chiều về", backFinal);
  }

  line("⏱ Chờ ("+(wait>4?wait-4:0)+" phút)", waitCharge);
  line("🌙 Phụ phí đêm", nightFee);

  document.getElementById('result').classList.remove('hidden');
  document.getElementById('empty').style.display='none';

  document.getElementById('total').innerText =
    "👉 Tổng tiền: "+ total.toLocaleString()+" đ";

  if(returnTrip){
    document.getElementById('saving').innerText =
      "💰 Tiết kiệm: "+ backDiscount.toLocaleString()+" đ";
  } else {
    document.getElementById('saving').innerText="";
  }
}

// ===== CALL =====
function callNow(){
  window.location.href = "tel:0935183343";
}

// ===== ZALO =====
function zaloNow(){
  window.location.href = "https://zalo.me/0935183343";
}
</script>

</body>
</html>
